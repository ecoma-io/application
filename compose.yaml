name: ecoma-dev-infras

networks:
  ecomma:
    name: ecomma-dev
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24
          gateway: 10.10.10.1

services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - 443:443
      - 80:80
    volumes:
      - .docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - .docker/nginx/certs:/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      ecomma:
        ipv4_address: 10.10.10.2
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "--no-check-certificate",
          "https://mail.fbi.com",
        ]
      interval: 5s
      timeout: 8s
      retries: 10
      start_period: 10s

  maildev:
    image: maildev/maildev
    container_name: maildev
    restart: always
    ports:
      - "1025:1025" # SMTP Server
    networks:
      ecomma:
        ipv4_address: 10.10.10.3
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:1080"]
      interval: 5s
      timeout: 8s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio
    container_name: minio
    restart: always
    ports:
      - "9000:9000" # API S3
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9091"
    networks:
      ecomma:
        ipv4_address: 10.10.10.4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 8s
      retries: 10
      start_period: 10s

  minio-mc:
    image: minio/mc
    container_name: minio-mc
    restart: always
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 minioadmin minioadmin;
      mc ls minio/assets || mc mb minio/assets;
      mc anonymous set public minio/assets;
      mc ls minio/private || mc mb minio/private;
      mc anonymous set none minio/private;
      echo 'Bucket created!';
      sleep infinity;
      "
    networks:
      ecomma:
        ipv4_address: 10.10.10.5

  nats:
    image: nats:2.11-alpine
    container_name: nats
    restart: always
    ports:
      - "4222:4222"
    networks:
      ecomma:
        ipv4_address: 10.10.10.6
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "--no-check-certificate",
          "http://127.0.0.1:8222/healthz",
        ]
      interval: 5s
      timeout: 8s
      retries: 10
      start_period: 10s

  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3.8.5-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      ecomma:
        ipv4_address: 10.10.10.8
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 8s
      retries: 10
      start_period: 10s

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_MULTIPLE_DATABASES: translations
      # see: https://github.com/mrts/docker-postgresql-multiple-databases/blob/master/README.md
    ports:
      - "5432:5432"
    volumes:
      - .docker/postgres/create-mutiple-database.sh:/docker-entrypoint-initdb.d/create-mutiple-database.sh
    networks:
      ecomma:
        ipv4_address: 10.10.10.9
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d database"]
      interval: 5s
      timeout: 8s
      retries: 10
      start_period: 15s

  postgres-admin:
    image: adminer:4.8.1
    container_name: postgres-admin
    volumes:
      - .docker/postgres/adminer-auto-login.php:/var/www/html/plugins-enabled/adminer-auto-login.php
    networks:
      ecomma:
        ipv4_address: 10.10.10.10
    depends_on:
      postgres:
        condition: service_healthy

  mongodb:
    image: mongo:4
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: user
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: database
    networks:
      ecomma:
        ipv4_address: 10.10.10.11
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.runCommand('ping').ok"]
      interval: 5s
      timeout: 8s
      retries: 10
      start_period: 10s

  mongo-express:
    image: mongo-express:1.0.2
    container_name: mongo-express
    restart: always
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://user:password@mongodb:27017
      ME_CONFIG_MONGODB_ENABLE_ADMIN: true
      ME_CONFIG_BASICAUTH: false
      ME_CONFIG_BASICAUTH_ENABLED: false
      VCAP_APP_HOST: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      ecomma:
        ipv4_address: 10.10.10.12
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "--no-check-certificate",
          "http://127.0.0.1:8081",
        ]
      interval: 5s
      timeout: 8s
      retries: 10
      start_period: 10s


  email-notification-worker:
    image: ghcr.io/ecoma-io/email-notification-worker
    container_name: email-notification-worker
    pull_policy: if_not_present
    restart: always
    environment:
      - PORT=3000
      - RABBITMQ_SERVERS=amqp://rabbitmq:5672
      - SMTP_SERVER=smtp://maildev:1025
    networks:
      ecomma:
        ipv4_address: 10.10.10.50
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "--no-check-certificate",
          "http://127.0.0.1:3000/health",
        ]
      interval: 5s
      timeout: 8s
      retries: 10
      start_period: 10s


  icons:
    image: ghcr.io/ecoma-io/icons
    container_name: icons
    pull_policy: if_not_present
    restart: always
    networks:
      ecomma:
        ipv4_address: 10.10.10.101

  home-site:
    image: ghcr.io/ecoma-io/home-site
    container_name: home-site
    pull_policy: if_not_present
    restart: always
    networks:
      ecomma:
        ipv4_address: 10.10.10.100
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "--no-check-certificate",
          "http://127.0.0.1:4000",
        ]
      interval: 5s
      timeout: 8s
      retries: 10
      start_period: 10s

  accounts-site:
    image: ghcr.io/ecoma-io/accounts-site
    container_name: accounts-site
    pull_policy: if_not_present
    restart: always
    networks:
      ecomma:
        ipv4_address: 10.10.10.110
