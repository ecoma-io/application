<p
  class="text-center text-3xl font-bold md:leading-tight md:text-left md:text-5xl"
>
  Forgot password?
</p>
<p class="mt-6 text-center md:text-left">
  Enter the email address associated with your account and we will send you a
  link to reset your password.
</p>
<form class="flex flex-col pt-3 md:pt-8">
  <label class="form-control w-full mt-4">
    <div class="relative">
      <input
        type="email"
        class="input input-bordered w-full pl-10"
        placeholder="Enter your email"
      />
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 16 16"
        fill="currentColor"
        class="absolute left-3 top-1/2 transform -translate-y-1/2 h-4 w-4 opacity-70"
      >
        <path
          d="M2.5 3A1.5 1.5 0 0 0 1 4.5v.793c.026.009.051.02.076.032L7.674 8.51c.206.1.446.1.652 0l6.598-3.185A.755.755 0 0 1 15 5.293V4.5A1.5 1.5 0 0 0 13.5 3h-11Z"
        />
        <path
          d="M15 6.954 8.978 9.86a2.25 2.25 0 0 1-1.956 0L1 6.954V11.5A1.5 1.5 0 0 0 2.5 13h11a1.5 1.5 0 0 0 1.5-1.5V6.954Z"
        />
      </svg>
    </div>
  </label>
  <p class="text-gray-600 mt-4 text-sm">
    <a href="/sign-in" class="link link-hover">Still remember your password?</a>
  </p>
  <button class="btn btn-primary mt-4">Sign In</button>
</form>
<div class="py-12 text-center">
  <p class="text-gray-600">
    Don't have an account?
    <a href="/sign-up" class="link link-primary">Sign Up for free</a>
  </p>
</div>
